<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>고인홍왕 MT · 사진 공유</title>
<meta name="description" content="고인홍왕 MT 2026 여름 엠티 사진 공유 페이지">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Gowun+Dodum&family=Jua&display=swap" rel="stylesheet">

<style>
  :root{
    --sky-top:#8ed6ff;
    --sky-mid:#bdeaff;
    --sea-1:#2fb5c4;
    --sea-2:#1a8fb0;
    --sea-3:#0f6f96;
    --sand:#ffe9b3;
    --sun:#ffd166;
    --ink:#123047;
    --ink-soft:#3a5a72;
    --card-bg:#ffffff;
    --accent:#ff6f61;
    --accent-2:#06b6d4;
    --glass-bg:rgba(255,255,255,0.55);
    --glass-border:rgba(255,255,255,0.7);
    --radius-lg:24px;
    --radius-md:16px;
    --radius-sm:10px;
    --film-h-desktop:180px;
    --film-h-tablet:140px;
    --film-h-mobile:110px;
    --sand-h-desktop:260px;
    --sand-h-tablet:210px;
    --sand-h-mobile:170px;
  }

  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;
    overflow-x:hidden;
    width:100%;
  }
  body{
    font-family:'Gowun Dodum','Jua',sans-serif;
    color:var(--ink);
    background:#eaf7fb;
    line-height:1.5;
  }
  img{max-width:100%;display:block;}
  button{font-family:inherit;cursor:pointer;}
  a{color:inherit;}

  h1,h2,h3{font-family:'Jua','Black Han Sans',sans-serif;margin:0;letter-spacing:0.5px;}

  .section-title{
    text-align:center;
    font-size:clamp(1.4rem,3.2vw,2.2rem);
    color:var(--ink);
    margin:0 0 1.2rem;
  }

  /* ---------- 안내 배너 (미리보기 모드) ---------- */
  #config-banner{
    display:none;
    position:sticky;
    top:0;
    z-index:500;
    background:linear-gradient(90deg,#ffe29f,#ffa99f);
    color:#5c3a00;
    text-align:center;
    padding:10px 16px;
    font-size:0.92rem;
    font-weight:600;
    box-shadow:0 2px 8px rgba(0,0,0,0.12);
  }

  /* ---------- 히어로 ---------- */
  .hero{
    position:relative;
    min-height:88vh;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    background:linear-gradient(180deg,var(--sky-top) 0%,var(--sky-mid) 45%,var(--sea-1) 68%,var(--sea-2) 85%,var(--sea-3) 100%);
    padding:40px 20px 0;
  }

  .sun{
    position:absolute;
    top:8%;
    right:10%;
    width:120px;
    height:120px;
    border-radius:50%;
    background:radial-gradient(circle at 35% 35%,#fffdf0,var(--sun) 55%,#ffb347 100%);
    box-shadow:0 0 100px 45px rgba(255,209,102,0.6);
    z-index:1;
    animation:pulseSun 4s ease-in-out infinite;
  }
  @keyframes pulseSun{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.06);}
  }
  .sun-glow{
    position:absolute;
    top:-6%;
    right:-4%;
    width:420px;
    height:420px;
    border-radius:50%;
    background:radial-gradient(circle,rgba(255,246,216,0.55) 0%,rgba(255,246,216,0.22) 45%,rgba(255,246,216,0) 72%);
    z-index:1;
    pointer-events:none;
  }

  /* ---------- 모래사장 ---------- */
  .sand{
    position:absolute;
    left:0;right:0;
    bottom:0;
    height:var(--sand-h-desktop);
    z-index:1;
    pointer-events:none;
    overflow:hidden;
  }
  .sand svg{display:block;width:100%;height:100%;}

  /* ---------- 야자수 ---------- */
  .palm{
    position:absolute;
    bottom:14px;
    z-index:3;
    pointer-events:none;
    filter:drop-shadow(0 12px 16px rgba(0,50,30,0.28));
  }
  .palm svg{display:block;width:100%;height:auto;}
  .palm.left{
    left:-16px;
    width:300px;
    bottom:2px;
    transform:scaleX(-1);
  }
  .palm.right{
    right:-6px;
    width:215px;
    bottom:22px;
  }
  @keyframes frondSway{
    0%,100%{transform:rotate(-3deg);}
    50%{transform:rotate(3deg);}
  }
  .palm-crown-sway{
    transform-origin:0 0;
    animation:frondSway 4.6s ease-in-out infinite;
  }
  .palm.left .palm-crown-sway{animation-duration:5.3s;animation-delay:.25s;}
  .palm.right .palm-crown-sway{animation-duration:4.2s;}

  /* ---------- 모래사장 소품 ---------- */
  .beach-props{
    position:absolute;
    inset:0;
    z-index:3;
    pointer-events:none;
  }
  .beach-props > *{
    position:absolute;
    display:block;
  }
  .crab{width:52px;}
  .crab-1{left:9%;bottom:7%;animation:crabScuttle 6.4s ease-in-out infinite;}
  .crab-2{left:63%;bottom:4.5%;width:42px;animation:crabScuttle 7.2s ease-in-out infinite reverse;}
  @keyframes crabScuttle{
    0%,100%{transform:translateX(0);}
    25%{transform:translateX(14px);}
    50%{transform:translateX(0);}
    75%{transform:translateX(-14px);}
  }
  @keyframes clawWiggle{
    0%,100%{transform:rotate(0deg);}
    50%{transform:rotate(-10deg);}
  }
  .crab-claw-l,.crab-claw-r{transform-box:fill-box;transform-origin:70% 55%;animation:clawWiggle 1.3s ease-in-out infinite;}

  .shell-1{left:22%;bottom:11%;width:38px;transform:rotate(12deg);}
  .shell-2{left:36%;bottom:5.5%;width:34px;transform:rotate(-22deg);}
  .shell-3{left:79%;bottom:9%;width:32px;transform:rotate(20deg);}
  .starfish{left:50%;bottom:3.5%;width:40px;transform:rotate(-12deg);}
  .drink{left:15%;bottom:15%;width:38px;}
  .ball{left:85%;bottom:13%;width:44px;transform:rotate(-8deg);}

  .floaties{
    position:absolute;
    inset:0;
    pointer-events:none;
    z-index:3;
  }
  .floaties span{
    position:absolute;
    font-size:2rem;
    animation:floatUp 6s ease-in-out infinite;
    filter:drop-shadow(0 4px 4px rgba(0,0,0,0.15));
  }
  @keyframes floatUp{
    0%,100%{transform:translateY(0) rotate(-4deg);}
    50%{transform:translateY(-22px) rotate(6deg);}
  }

  /* ---------- 바다 위 떠오르는 방명록 ---------- */
  #floating-msgs{
    position:absolute;
    left:0;right:0;
    top:44%;
    bottom:0;
    z-index:3;
    pointer-events:none;
    overflow:hidden;
  }
  .float-msg{
    position:absolute;
    max-width:78vw;
    animation:fmBob 3.4s ease-in-out infinite;
    will-change:transform;
  }
  .float-msg-inner{
    display:inline-flex;
    align-items:center;
    gap:4px;
    flex-wrap:wrap;
    max-width:min(70vw,320px);
    padding:10px 16px;
    border-radius:999px;
    background:rgba(255,255,255,0.55);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,0.7);
    box-shadow:0 8px 22px rgba(15,111,150,0.25);
    color:var(--ink);
    font-size:0.92rem;
    line-height:1.4;
    word-break:break-word;
    opacity:0;
    transform:translateY(18px);
    transition:opacity .6s ease, transform .6s ease;
  }
  .float-msg-inner.visible{
    opacity:1;
    transform:translateY(0);
  }
  .float-msg-inner.leaving{
    opacity:0;
    transform:translateY(-26px);
  }
  .float-msg-inner .fm-name{font-weight:700;}
  @keyframes fmBob{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-6px);}
  }

  /* ---------- 관리자 고정 말풍선 (상시 노출) ---------- */
  .float-msg-pinned{
    position:absolute;
    top:8%;
    left:3%;
    z-index:4;
    max-width:min(38vw,340px);
    pointer-events:none;
    animation:fmPinnedBob 3.8s ease-in-out infinite;
    will-change:transform;
  }
  @keyframes fmPinnedBob{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-7px);}
  }
  .float-msg-pinned-inner{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:4px;
    flex-wrap:wrap;
    max-width:min(74vw,360px);
    padding:12px 22px;
    border-radius:999px;
    background:rgba(255,255,255,0.68);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    border:2px solid rgba(255,209,102,0.95);
    box-shadow:
      0 0 0 3px rgba(255,111,97,0.18),
      0 10px 26px rgba(255,159,28,0.35),
      0 0 26px rgba(255,209,102,0.6);
    color:var(--ink);
    font-size:1rem;
    font-weight:700;
    line-height:1.4;
    text-align:center;
    word-break:break-word;
    opacity:0;
    transform:translateY(-14px);
    transition:opacity .7s ease, transform .7s ease;
  }
  .float-msg-pinned-inner.visible{
    opacity:1;
    transform:translateY(0);
  }
  .float-msg-pinned-inner .fm-name{font-weight:800;color:#b3311f;}
  @media (max-width:640px){
    .float-msg-inner{font-size:0.76rem;padding:8px 12px;max-width:62vw;}
    .float-msg-pinned{top:30%;left:3%;max-width:72vw;}
    .float-msg-pinned-inner{font-size:0.8rem;padding:8px 14px;max-width:70vw;}
  }

  .hero-content{
    position:relative;
    z-index:4;
    padding-bottom:70px;
  }
  .hero-title{
    font-size:clamp(2.8rem,10vw,5.6rem);
    color:#083a5e;
    text-shadow:
      0 0 6px rgba(255,255,255,0.95),
      0 0 14px rgba(255,255,255,0.9),
      0 0 30px rgba(255,255,255,0.85),
      0 0 55px rgba(255,255,255,0.7),
      0 6px 20px rgba(8,58,94,0.3);
  }
  .hero-subtitle{
    margin-top:10px;
    font-size:clamp(1rem,2.6vw,1.35rem);
    color:#f2fbff;
    font-weight:600;
    text-shadow:0 2px 8px rgba(0,40,60,0.25);
  }
  .hero-cta{
    margin-top:30px;
    display:inline-block;
    background:var(--accent);
    color:#fff;
    border:none;
    padding:16px 34px;
    font-size:1.15rem;
    font-family:'Jua',sans-serif;
    border-radius:100px;
    box-shadow:0 10px 24px rgba(255,111,97,0.45);
    transition:transform .18s ease, box-shadow .18s ease;
  }
  .hero-cta:hover{transform:translateY(-3px) scale(1.03);box-shadow:0 14px 30px rgba(255,111,97,0.55);}
  .hero-cta:active{transform:translateY(0) scale(0.98);}

  .waves{
    position:absolute;
    left:0;right:0;bottom:0;
    height:170px;
    z-index:2;
    overflow:hidden;
  }
  .wave-row{
    position:absolute;
    left:0;right:0;
    overflow:hidden;
    width:100%;
    height:100%;
  }
  .wave-row svg{
    display:block;
    width:200%;
    height:100%;
    animation:waveMove 14s linear infinite;
  }
  .wave1 svg{animation-duration:16s;}
  .wave2 svg{animation-duration:22s;animation-direction:reverse;}
  .wave3 svg{animation-duration:28s;}
  @keyframes waveMove{
    from{transform:translateX(0);}
    to{transform:translateX(-50%);}
  }

  /* ---------- 필름 스트립 갤러리 ---------- */
  .filmstrip-section{
    background:#0d0d0d;
    padding:34px 0;
  }
  .filmstrip-section .section-title{color:#fff;}
  .filmstrip-row{
    position:relative;
    overflow:hidden;
    background:#1b1b1b;
    height:var(--film-h-desktop);
    margin:14px 0;
    box-shadow:inset 0 0 30px rgba(0,0,0,0.6);
  }
  .filmstrip-row::before,
  .filmstrip-row::after{
    content:"";
    position:absolute;
    left:0;right:0;
    height:16px;
    z-index:5;
    background:repeating-linear-gradient(90deg,#f4f4f4 0 12px,transparent 12px 28px);
    opacity:0.9;
  }
  .filmstrip-row::before{top:6px;}
  .filmstrip-row::after{bottom:6px;}

  .filmstrip-track{
    display:flex;
    align-items:center;
    height:100%;
    width:max-content;
    will-change:transform;
    animation:filmScroll 46s linear infinite;
    padding:0 8px;
  }
  .filmstrip-row.reverse .filmstrip-track{
    animation-direction:reverse;
    animation-duration:54s;
  }
  @keyframes filmScroll{
    from{transform:translateX(0);}
    to{transform:translateX(-50%);}
  }
  .filmstrip-row:hover .filmstrip-track{
    animation-play-state:paused;
  }

  .film-card{
    flex:0 0 auto;
    height:calc(100% - 40px);
    aspect-ratio:4/3;
    margin:0 8px;
    border-radius:8px;
    overflow:hidden;
    border:3px solid #f4f4f4;
    box-shadow:0 6px 14px rgba(0,0,0,0.5);
    background:#333;
    cursor:pointer;
    position:relative;
  }
  .film-card img{
    width:100%;height:100%;object-fit:cover;
  }
  .film-card.placeholder{
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:2.4rem;
    cursor:default;
  }

  /* ---------- 업로드 섹션 ---------- */
  .upload-section{
    padding:60px 20px;
    background:linear-gradient(180deg,#eaf7fb,#dff3f8);
    display:flex;
    justify-content:center;
  }
  .upload-card{
    width:100%;
    max-width:620px;
    background:var(--glass-bg);
    border:1px solid var(--glass-border);
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
    border-radius:var(--radius-lg);
    padding:32px;
    box-shadow:0 12px 40px rgba(15,111,150,0.18);
  }
  .name-input{
    width:100%;
    padding:14px 16px;
    border-radius:var(--radius-sm);
    border:2px solid rgba(15,111,150,0.25);
    background:rgba(255,255,255,0.8);
    font-size:1rem;
    font-family:inherit;
    margin-bottom:18px;
    outline:none;
    transition:border-color .15s ease;
  }
  .name-input:focus{border-color:var(--accent-2);}

  .dropzone{
    border:3px dashed rgba(15,111,150,0.4);
    border-radius:var(--radius-md);
    padding:40px 20px;
    text-align:center;
    background:rgba(255,255,255,0.35);
    transition:background .2s ease, border-color .2s ease;
  }
  .dropzone.dragover{
    background:rgba(6,182,212,0.18);
    border-color:var(--accent-2);
  }
  .dropzone p{margin:0 0 14px;font-size:1.02rem;color:var(--ink-soft);}
  .select-btn{
    background:var(--accent-2);
    color:#fff;
    border:none;
    padding:14px 28px;
    min-height:44px;
    border-radius:100px;
    font-size:1rem;
    font-family:'Jua',sans-serif;
    box-shadow:0 8px 18px rgba(6,182,212,0.35);
    transition:transform .15s ease;
  }
  .select-btn:hover{transform:translateY(-2px);}
  #file-input{display:none;}

  .upload-btn-row{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:12px;
  }
  .camera-btn{
    background:linear-gradient(135deg,var(--accent),#ff9a6c);
    color:#fff;
    border:none;
    padding:14px 28px;
    min-height:44px;
    border-radius:100px;
    font-size:1rem;
    font-family:'Jua',sans-serif;
    box-shadow:0 8px 18px rgba(255,111,97,0.35);
    transition:transform .15s ease;
  }
  .camera-btn:hover{transform:translateY(-2px);}
  #camera-input{display:none;}

  /* ---------- 플로팅 카메라 버튼 (FAB) ---------- */
  .fab-camera{
    position:fixed;
    right:20px;
    bottom:24px;
    width:60px;
    height:60px;
    min-width:56px;
    min-height:56px;
    border-radius:50%;
    border:none;
    background:linear-gradient(135deg,var(--accent-2),var(--sea-2));
    color:#fff;
    font-size:1.6rem;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 10px 26px rgba(15,111,150,0.45);
    z-index:600;
    transition:transform .18s ease, box-shadow .18s ease;
  }
  .fab-camera:hover{transform:translateY(-3px) scale(1.05);box-shadow:0 14px 32px rgba(15,111,150,0.55);}
  .fab-camera:active{transform:translateY(0) scale(0.96);}

  /* ---------- 관리자 톱니바퀴 FAB ---------- */
  .fab-admin{
    position:fixed;
    right:20px;
    bottom:96px;
    width:44px;
    height:44px;
    min-width:44px;
    min-height:44px;
    border-radius:50%;
    border:none;
    background:rgba(18,48,71,0.55);
    color:#fff;
    font-size:1.15rem;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 8px 20px rgba(15,111,150,0.35);
    z-index:600;
    transition:transform .18s ease, background .18s ease, box-shadow .18s ease;
  }
  .fab-admin:hover{transform:translateY(-2px) scale(1.05);}
  .fab-admin:active{transform:translateY(0) scale(0.96);}
  .fab-admin.active{
    background:linear-gradient(135deg,var(--accent),#ff9a6c);
    box-shadow:0 10px 24px rgba(255,111,97,0.45);
  }

  /* ---------- 관리자 비밀번호 모달 ---------- */
  .admin-modal-overlay{
    position:fixed;
    inset:0;
    z-index:1300;
    background:rgba(5,15,25,0.55);
    display:none;
    align-items:center;
    justify-content:center;
    padding:20px;
  }
  .admin-modal-overlay.open{display:flex;}
  .admin-modal{
    width:100%;
    max-width:340px;
    background:var(--card-bg);
    border-radius:var(--radius-lg);
    padding:26px;
    box-shadow:0 20px 50px rgba(0,0,0,0.35);
  }
  .admin-modal h3{
    font-family:'Black Han Sans',sans-serif;
    font-size:1.15rem;
    margin-bottom:16px;
    text-align:center;
    color:var(--ink);
  }
  .admin-modal input[type="password"]{
    width:100%;
    padding:12px 14px;
    border-radius:var(--radius-sm);
    border:2px solid rgba(15,111,150,0.25);
    font-size:1rem;
    font-family:inherit;
    margin-bottom:16px;
    outline:none;
    box-sizing:border-box;
  }
  .admin-modal input[type="password"]:focus{border-color:var(--accent-2);}
  .admin-modal-btn-row{display:flex;gap:10px;}
  .admin-modal-btn-row button{
    flex:1;
    min-height:44px;
    border:none;
    border-radius:100px;
    font-family:'Jua',sans-serif;
    font-size:0.95rem;
  }
  .admin-modal-confirm{background:var(--accent-2);color:#fff;}
  .admin-modal-cancel{background:rgba(15,111,150,0.12);color:var(--ink);}
  .admin-modal-off-btn{
    width:100%;
    min-height:44px;
    border:none;
    border-radius:100px;
    background:rgba(255,111,97,0.18);
    color:#b3311f;
    font-family:'Jua',sans-serif;
    font-size:0.95rem;
  }
  .admin-toggle-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    margin-bottom:16px;
    padding:8px 4px;
  }
  .admin-toggle-label{font-size:0.92rem;color:var(--ink);}
  .admin-toggle-switch{
    position:relative;
    width:50px;
    height:28px;
    min-width:50px;
    min-height:28px;
    border-radius:100px;
    border:none;
    background:rgba(15,111,150,0.25);
    padding:0;
    flex-shrink:0;
    transition:background .2s ease;
  }
  .admin-toggle-switch.on{background:var(--accent-2);}
  .admin-toggle-knob{
    position:absolute;
    top:3px;left:3px;
    width:22px;height:22px;
    border-radius:50%;
    background:#fff;
    box-shadow:0 2px 6px rgba(0,0,0,0.25);
    transition:transform .2s ease;
  }
  .admin-toggle-switch.on .admin-toggle-knob{transform:translateX(22px);}

  .upload-progress{
    margin-top:18px;
    display:none;
  }
  .upload-progress.show{display:block;}
  .upload-progress p{
    margin:0 0 8px;
    font-size:0.95rem;
    color:var(--ink-soft);
    text-align:center;
    font-weight:600;
  }
  .progress-bar-outer{
    height:10px;
    border-radius:6px;
    background:rgba(15,111,150,0.15);
    overflow:hidden;
  }
  .progress-bar-inner{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,var(--accent-2),var(--accent));
    transition:width .25s ease;
  }

  /* ---------- 전체 갤러리 그리드 ---------- */
  .gallery-section{
    padding:60px 20px 80px;
    background:#eaf7fb;
  }
  .gallery-counter{
    text-align:center;
    font-size:1.1rem;
    font-weight:700;
    color:var(--ink-soft);
    margin-bottom:26px;
  }
  .gallery-header{
    max-width:1200px;
    margin:0 auto 26px;
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    justify-content:center;
    gap:14px;
  }
  .gallery-header .gallery-counter{margin-bottom:0;}
  .download-all-btn{
    background:linear-gradient(135deg,var(--sea-2),var(--accent-2));
    color:#fff;
    border:none;
    padding:12px 24px;
    min-height:44px;
    border-radius:100px;
    font-size:0.95rem;
    font-family:'Jua',sans-serif;
    box-shadow:0 8px 18px rgba(15,111,150,0.3);
    transition:transform .15s ease, opacity .15s ease;
    white-space:nowrap;
  }
  .download-all-btn:hover{transform:translateY(-2px);}
  .download-all-btn:disabled{opacity:0.7;cursor:default;transform:none;}
  .gallery-grid{
    max-width:1200px;
    margin:0 auto;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:18px;
  }
  .grid-card{
    position:relative;
    background:var(--card-bg);
    border-radius:var(--radius-md);
    overflow:hidden;
    box-shadow:0 8px 20px rgba(15,111,150,0.16);
    aspect-ratio:1/1;
    cursor:pointer;
    transition:transform .2s ease, box-shadow .2s ease;
  }
  .grid-card:hover{transform:translateY(-4px);box-shadow:0 14px 28px rgba(15,111,150,0.24);}
  .grid-card img{width:100%;height:100%;object-fit:cover;}
  .grid-card.placeholder{
    display:flex;align-items:center;justify-content:center;
    font-size:2.8rem;cursor:default;
  }
  .grid-card.placeholder:hover{transform:none;}
  .grid-card-info{
    position:absolute;
    left:0;right:0;bottom:0;
    padding:8px 10px;
    background:linear-gradient(0deg,rgba(0,0,0,0.65),transparent);
    color:#fff;
    display:flex;
    justify-content:space-between;
    font-size:0.78rem;
    gap:6px;
  }
  .grid-card-info .uploader-name{font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .grid-card-info .upload-time{opacity:0.9;flex-shrink:0;}

  .grid-card-delete{
    position:absolute;
    top:8px;
    right:8px;
    width:32px;
    height:32px;
    min-width:32px;
    min-height:32px;
    border-radius:50%;
    border:none;
    background:rgba(0,0,0,0.55);
    color:#fff;
    font-size:0.95rem;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:2;
  }
  .grid-card-confirm{
    position:absolute;
    inset:0;
    background:rgba(5,15,25,0.75);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:10px;
    color:#fff;
    text-align:center;
    padding:10px;
    z-index:3;
    font-size:0.85rem;
  }
  .grid-card-confirm .confirm-btn-row{display:flex;gap:8px;}
  .grid-card-confirm button{
    border:none;
    border-radius:100px;
    padding:8px 14px;
    min-height:36px;
    font-size:0.8rem;
    font-family:inherit;
  }
  .grid-card-confirm .confirm-yes{background:var(--accent);color:#fff;}
  .grid-card-confirm .confirm-no{background:rgba(255,255,255,0.85);color:var(--ink);}

  /* ---------- 방명록 섹션 ---------- */
  .guestbook-section{
    padding:60px 20px 80px;
    background:linear-gradient(180deg,#dff3f8,#eaf7fb);
  }
  .guestbook-wrap{
    max-width:700px;
    margin:0 auto;
  }
  .guestbook-form{
    background:var(--glass-bg);
    border:1px solid var(--glass-border);
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
    border-radius:var(--radius-lg);
    padding:28px;
    box-shadow:0 12px 40px rgba(15,111,150,0.18);
    margin-bottom:30px;
  }
  .guestbook-form input[type="text"],
  .guestbook-form textarea{
    width:100%;
    padding:14px 16px;
    border-radius:var(--radius-sm);
    border:2px solid rgba(15,111,150,0.25);
    background:rgba(255,255,255,0.8);
    font-size:1rem;
    font-family:inherit;
    outline:none;
    transition:border-color .15s ease;
    resize:vertical;
    box-sizing:border-box;
  }
  .guestbook-form input[type="text"]:focus,
  .guestbook-form textarea:focus{border-color:var(--accent-2);}
  .guestbook-name-input{margin-bottom:14px;}
  .guestbook-msg-input{min-height:90px;margin-bottom:6px;}
  .guestbook-char-count{
    text-align:right;
    font-size:0.82rem;
    color:var(--ink-soft);
    margin:0 0 16px;
  }
  .guestbook-submit-btn{
    display:block;
    margin:0 auto;
    background:linear-gradient(135deg,var(--accent),#ff9a6c);
    color:#fff;
    border:none;
    padding:14px 34px;
    min-height:44px;
    border-radius:100px;
    font-size:1rem;
    font-family:'Jua',sans-serif;
    box-shadow:0 8px 18px rgba(255,111,97,0.35);
    transition:transform .15s ease;
  }
  .guestbook-submit-btn:hover{transform:translateY(-2px);}
  .guestbook-off-notice{
    display:none;
    text-align:center;
    background:rgba(255,111,97,0.14);
    color:#b3311f;
    padding:12px 16px;
    border-radius:var(--radius-sm);
    font-size:0.92rem;
    font-weight:600;
    margin-bottom:16px;
  }
  .guestbook-off-notice.show{display:block;}
  .guestbook-form.disabled input,
  .guestbook-form.disabled textarea,
  .guestbook-form.disabled button{
    opacity:0.5;
    pointer-events:none;
  }

  .guestbook-list{
    display:flex;
    flex-direction:column;
    gap:14px;
  }
  .guestbook-entry{
    background:var(--card-bg);
    border-radius:var(--radius-md);
    padding:16px 18px;
    box-shadow:0 6px 16px rgba(15,111,150,0.12);
    display:flex;
    gap:12px;
  }
  .guestbook-entry-icon{font-size:1.3rem;flex-shrink:0;line-height:1.4;}
  .guestbook-entry-body{flex:1;min-width:0;}
  .guestbook-entry-head{
    display:flex;
    align-items:baseline;
    gap:8px;
    flex-wrap:wrap;
    margin-bottom:4px;
  }
  .guestbook-entry-name{font-weight:700;color:var(--ink);}
  .guestbook-entry-time{font-size:0.8rem;color:var(--ink-soft);}
  .guestbook-entry-edited{font-size:0.78rem;color:var(--ink-soft);opacity:0.75;}
  .guestbook-entry-msg{
    margin:0;
    color:var(--ink);
    white-space:pre-wrap;
    word-break:break-word;
    line-height:1.5;
  }
  .guestbook-entry-actions{
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    gap:8px;
    margin-top:10px;
  }
  .guestbook-entry-actions span{font-size:0.85rem;color:var(--ink-soft);}
  .guestbook-entry-actions button{
    border:none;
    border-radius:100px;
    padding:8px 14px;
    min-height:36px;
    font-size:0.82rem;
    font-family:inherit;
    background:rgba(15,111,150,0.12);
    color:var(--ink);
    transition:background .15s ease;
  }
  .guestbook-entry-actions button:hover{background:rgba(15,111,150,0.22);}
  .guestbook-entry-actions .danger-btn{background:rgba(255,111,97,0.18);color:#b3311f;}
  .guestbook-entry-actions .danger-btn:hover{background:rgba(255,111,97,0.32);}
  .guestbook-edit-textarea{
    width:100%;
    min-height:80px;
    padding:10px 12px;
    border-radius:var(--radius-sm);
    border:2px solid rgba(15,111,150,0.25);
    font-family:inherit;
    font-size:0.95rem;
    margin-top:6px;
    resize:vertical;
    box-sizing:border-box;
  }
  .guestbook-empty{
    text-align:center;
    color:var(--ink-soft);
    padding:20px;
  }

  /* ---------- 라이트박스 ---------- */
  .lightbox{
    position:fixed;
    inset:0;
    z-index:1000;
    background:rgba(5,15,25,0.92);
    display:none;
    align-items:center;
    justify-content:center;
    padding:20px;
  }
  .lightbox.open{display:flex;}
  .lightbox-inner{
    position:relative;
    max-width:min(90vw,900px);
    max-height:88vh;
    display:flex;
    flex-direction:column;
    align-items:center;
  }
  .lightbox img{
    max-width:100%;
    max-height:72vh;
    border-radius:var(--radius-sm);
    box-shadow:0 20px 50px rgba(0,0,0,0.5);
  }
  .lightbox-meta{
    color:#fff;
    margin-top:14px;
    text-align:center;
    font-size:0.95rem;
    opacity:0.9;
  }
  .lightbox-close{
    position:absolute;
    top:-46px;right:0;
    background:rgba(255,255,255,0.15);
    border:none;
    color:#fff;
    width:44px;height:44px;
    border-radius:50%;
    font-size:1.3rem;
    line-height:1;
  }
  .lightbox-nav{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    background:rgba(255,255,255,0.15);
    border:none;
    color:#fff;
    width:52px;height:52px;
    border-radius:50%;
    font-size:1.6rem;
  }
  .lightbox-nav.prev{left:-64px;}
  .lightbox-nav.next{right:-64px;}
  @media (max-width:900px){
    .lightbox-nav.prev{left:6px;}
    .lightbox-nav.next{right:6px;}
    .lightbox-close{top:6px;right:6px;}
  }

  /* ---------- 토스트 ---------- */
  #toast-container{
    position:fixed;
    left:50%;
    bottom:28px;
    transform:translateX(-50%);
    z-index:1200;
    display:flex;
    flex-direction:column;
    gap:8px;
    align-items:center;
    pointer-events:none;
  }
  .toast{
    background:rgba(18,48,71,0.95);
    color:#fff;
    padding:12px 20px;
    border-radius:100px;
    font-size:0.92rem;
    box-shadow:0 8px 22px rgba(0,0,0,0.3);
    opacity:0;
    transform:translateY(10px);
    transition:opacity .25s ease, transform .25s ease;
    max-width:90vw;
    text-align:center;
  }
  .toast.show{opacity:1;transform:translateY(0);}

  /* ---------- 푸터 ---------- */
  footer{
    text-align:center;
    padding:26px 20px;
    background:#123047;
    color:#dff3f8;
    font-size:0.95rem;
  }

  /* ---------- 반응형 ---------- */
  @media (max-width:1024px){
    .filmstrip-row{height:var(--film-h-tablet);}
    .gallery-grid{grid-template-columns:repeat(3,1fr);}
    .sand{height:var(--sand-h-tablet);}
    .palm.left{width:220px;}
    .palm.right{width:165px;}
    .shell-3,.ball{display:none;}
  }
  @media (max-width:640px){
    .filmstrip-row{height:var(--film-h-mobile);}
    .gallery-grid{grid-template-columns:repeat(2,1fr);gap:12px;}
    .hero{min-height:80vh;}
    .sand{height:var(--sand-h-mobile);}
    .palm.right{display:none;}
    .palm.left{width:130px;left:-10px;bottom:0;}
    .crab-2,.shell-2,.shell-3,.ball{display:none;}
    .crab-1{width:40px;}
    .shell-1{width:28px;}
    .starfish{width:30px;}
    .drink{width:30px;left:10%;bottom:10%;}
    .select-btn,.hero-cta,.camera-btn,.download-all-btn{min-height:44px;}
    .lightbox-nav{width:44px;height:44px;font-size:1.3rem;}
    .upload-card{padding:22px;}
    .upload-btn-row{gap:10px;}
    .fab-camera{right:16px;bottom:18px;width:56px;height:56px;min-width:56px;min-height:56px;font-size:1.4rem;}
    .fab-admin{right:16px;bottom:86px;}
    .gallery-header{gap:10px;}
    .guestbook-form{padding:20px;}
    .guestbook-entry{padding:14px;}
    .guestbook-entry-actions button{min-height:44px;}
  }
  @media (prefers-reduced-motion: reduce){
    .filmstrip-track,.wave-row svg,.floaties span,.sun,.palm-crown-sway,.crab,.crab-claw-l,.crab-claw-r,.float-msg,.float-msg-pinned{
      animation-play-state:paused !important;
      animation:none !important;
    }
    /* 일반 순환 말풍선(.float-msg)은 JS에서 생성 자체를 막으므로 컨테이너를
       통째로 숨기지 않고, 관리자 고정 말풍선(.float-msg-pinned)은 표시를 유지한다. */
  }
</style>
</head>

/* ================= 시간 표시 ================= */
function timeAgo(ts) {
  if (!ts) return "방금 전";
  let date;
  if (typeof ts.toDate === "function") date = ts.toDate();
  else date = new Date(ts);
  const diffSec = Math.floor((Date.now() - date.getTime()) / 1000);
  if (diffSec < 60) return "방금 전";
  const diffMin = Math.floor(diffSec / 60);
  if (diffMin < 60) return `${diffMin}분 전`;
  const diffHour = Math.floor(diffMin / 60);
  if (diffHour < 24) return `${diffHour}시간 전`;
  const diffDay = Math.floor(diffHour / 24);
  return `${diffDay}일 전`;
}

/* ================= 이미지 압축 ================= */
function dataUrlSizeBytes(dataUrl) {
  const base64 = dataUrl.split(",")[1] || "";
  return Math.ceil(base64.length * 3 / 4);
}

function loadImageFallback(file) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      resolve(img);
    };
    img.onerror = (e) => {
      URL.revokeObjectURL(url);
      reject(e);
    };
    img.src = url;
  });
}

async function fileToCompressedDataURL(file) {
  try {
    let source;
    try {
      source = await createImageBitmap(file, { imageOrientation: "from-image" });
    } catch (e) {
      source = await loadImageFallback(file);
    }

    let width = source.width;
    let height = source.height;
    const maxSide = 1200;
    if (width > maxSide || height > maxSide) {
      if (width > height) {
        height = Math.round(height * (maxSide / width));
        width = maxSide;
      } else {
        width = Math.round(width * (maxSide / height));
        height = maxSide;
      }
    }

    const canvas = document.createElement("canvas");
    canvas.width = width;
    canvas.height = height;
    const ctx = canvas.getContext("2d");
    ctx.drawImage(source, 0, 0, width, height);

    let quality = 0.72;
    let dataUrl = canvas.toDataURL("image/jpeg", quality);
    while (dataUrlSizeBytes(dataUrl) > 900 * 1024 && quality > 0.4) {
      quality = Math.round((quality - 0.1) * 100) / 100;
      dataUrl = canvas.toDataURL("image/jpeg", quality);
    }

    if (dataUrlSizeBytes(dataUrl) > 900 * 1024) {
      return null;
    }
    return dataUrl;
  } catch (err) {
    console.error("이미지 압축 실패:", err);
    return null;
  }
}

/* ================= 업로드 처리 ================= */
async function handleFiles(fileList) {
  if (!isConfigured || !db) {
    showToast("⚙️ 아직 서버 연결 전이에요. 가이드를 따라 설정을 완료해주세요!");
    return;
  }
  const files = Array.from(fileList).filter((f) => f.type.startsWith("image/"));
  if (files.length === 0) {
    showToast("이미지 파일을 선택해주세요.");
    return;
  }

  const name = els.nameInput.value.trim() || "익명";
  els.uploadProgress.classList.add("show");
  let successCount = 0;

  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    els.progressText.textContent = `${files.length}장 중 ${i + 1}장 업로드 중…`;
    els.progressBar.style.width = `${Math.round(((i) / files.length) * 100)}%`;

    const dataUrl = await fileToCompressedDataURL(file);
    if (!dataUrl) {
      showToast(`"${file.name}" 파일은 저장할 수 없어요 (형식 또는 용량 문제) 😢`);
      continue;
    }

    try {
      await addDoc(collection(db, "photos"), {
        img: dataUrl,
        name: name,
        createdAt: serverTimestamp()
      });
      successCount++;
    } catch (err) {
      console.error("업로드 실패:", err);
      showToast("업로드 중 오류가 발생했어요 😢");
    }
    els.progressBar.style.width = `${Math.round(((i + 1) / files.length) * 100)}%`;
  }

  setTimeout(() => {
    els.uploadProgress.classList.remove("show");
    els.progressBar.style.width = "0%";
  }, 500);

  if (successCount > 0) {
    showToast("추억이 저장됐어요! 🎉");
  }
  els.fileInput.value = "";
}

/* ================= 전체 다운로드 (ZIP) ================= */
const JSZIP_SRC = "https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js";
let jszipLoadPromise = null;

function loadJSZip() {
  if (window.JSZip) return Promise.resolve(window.JSZip);
  if (jszipLoadPromise) return jszipLoadPromise;
  jszipLoadPromise = new Promise((resolve, reject) => {
    const script = document.createElement("script");
    script.src = JSZIP_SRC;
    script.onload = () => {
      if (window.JSZip) resolve(window.JSZip);
      else reject(new Error("JSZip 로드 실패"));
    };
    script.onerror = () => {
      jszipLoadPromise = null;
      reject(new Error("JSZip 로드 실패"));
    };
    document.head.appendChild(script);
  });
  return jszipLoadPromise;
}

function sanitizeFilenamePart(str) {
  if (!str) return "";
  return str
    .normalize("NFC")
    .replace(/[\\/:*?"<>|]+/g, "")
    .replace(/\s+/g, "_")
    .trim();
}

function formatTimestampForFilename(ts) {
  let date;
  if (ts && typeof ts.toDate === "function") date = ts.toDate();
  else if (ts) date = new Date(ts);
  else date = new Date();
  if (isNaN(date.getTime())) date = new Date();
  const mm = String(date.getMonth() + 1).padStart(2, "0");
  const dd = String(date.getDate()).padStart(2, "0");
  const hh = String(date.getHours()).padStart(2, "0");
  const mi = String(date.getMinutes()).padStart(2, "0");
  return `${mm}${dd}-${hh}${mi}`;
}

function dataURLToUint8Array(dataUrl) {
  const base64 = dataUrl.split(",")[1] || "";
  const binaryStr = atob(base64);
  const len = binaryStr.length;
  const bytes = new Uint8Array(len);
  for (let i = 0; i < len; i++) bytes[i] = binaryStr.charCodeAt(i);
  return bytes;
}

async function handleDownloadAll() {
  if (!isConfigured || !db) {
    showToast("⚙️ 아직 서버 연결 전이에요. 가이드를 따라 설정을 완료해주세요!");
    return;
  }
  if (photos.length === 0) {
    showToast("아직 사진이 없어요 📭");
    return;
  }

  const originalText = els.downloadAllBtn.textContent;
  els.downloadAllBtn.disabled = true;
  els.downloadAllBtn.textContent = "준비 중…";

  try {
    const JSZip = await loadJSZip();
    const zip = new JSZip();

    /* photos는 최신순(desc)이라 업로드순으로 다시 뒤집는다 */
    const ordered = photos.slice().reverse();
    const total = ordered.length;

    ordered.forEach((photo, idx) => {
      const num = String(idx + 1).padStart(3, "0");
      const namePart = sanitizeFilenamePart(photo.name) || "익명";
      const timePart = formatTimestampForFilename(photo.createdAt);
      const filename = `${num}_${namePart}_${timePart}.jpg`;
      try {
        const bytes = dataURLToUint8Array(photo.img);
        zip.file(filename, bytes);
      } catch (e) {
        console.error(`"${filename}" 변환 실패:`, e);
      }
    });

    els.downloadAllBtn.textContent = `묶는 중… 0/${total}`;

    const blob = await zip.generateAsync({ type: "blob" }, (metadata) => {
      const done = Math.min(total, Math.round((metadata.percent / 100) * total));
      els.downloadAllBtn.textContent = `묶는 중… ${done}/${total}`;
    });

    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "고인홍왕MT_사진모음.zip";
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 2000);

    showToast("전체 사진을 zip으로 저장했어요! 🎉");
  } catch (err) {
    console.error("zip 생성 실패:", err);
    showToast("압축 파일을 만들지 못했어요 😢");
  } finally {
    els.downloadAllBtn.disabled = false;
    els.downloadAllBtn.textContent = originalText;
  }
}

/* ================= 필름 스트립 렌더링 ================= */
function padToMin(arr, min) {
  if (arr.length === 0) return [];
  const out = [];
  let i = 0;
  while (out.length < min) {
    out.push(arr[i % arr.length]);
    i++;
  }
  return out;
}

function buildFilmCard(item) {
  const card = document.createElement("div");
  if (item.type === "photo") {
    card.className = "film-card";
    const img = document.createElement("img");
    img.src = item.data.img;
    img.alt = "MT 사진";
    img.loading = "lazy";
    card.appendChild(img);
    card.addEventListener("click", () => {
      const idx = photos.findIndex((p) => p.id === item.data.id);
      if (idx !== -1) openLightbox(idx);
    });
  } else {
    card.className = "film-card placeholder";
    card.style.background = item.data.gradient;
    card.textContent = item.data.emoji;
    card.addEventListener("click", () => {
      if (!isConfigured) {
        showToast("👀 미리보기용 이미지예요. 실제 사진은 아니랍니다.");
      }
    });
  }
  return card;
}

function renderFilmStrip() {
  let baseItems;
  if (photos.length > 0) {
    baseItems = padToMin(photos, 8).map((p) => ({ type: "photo", data: p }));
  } else {
    baseItems = padToMin(PLACEHOLDER_ITEMS, 8).map((p) => ({ type: "placeholder", data: p }));
  }

  const row1Items = baseItems.concat(baseItems);
  const row2Base = baseItems.slice().reverse();
  const row2Items = row2Base.concat(row2Base);

  els.filmTrack1.innerHTML = "";
  row1Items.forEach((item) => els.filmTrack1.appendChild(buildFilmCard(item)));

  els.filmTrack2.innerHTML = "";
  row2Items.forEach((item) => els.filmTrack2.appendChild(buildFilmCard(item)));

/* ================= 바다 위 떠오르는 방명록 (큐 + 고정 슬롯) =================
   동작 방식:
   1) 방명록 글이 들어오면 enqueueFloatMessage()로 FIFO 큐(floatQueue)에 push.
   2) processFloatQueue()가 비어있는 슬롯(최대 5개)을 찾아 큐의 맨 앞 항목을 표시.
      빈 슬롯이 없으면 큐에 그대로 대기.
   3) 슬롯에 표시된 메시지는 7초(FLOAT_DISPLAY_MS) 뒤 퇴장 애니메이션을 시작하고,
      퇴장이 끝나면(추가 0.6초) 슬롯을 비우고 다시 processFloatQueue()를 호출해
      큐에 남은 다음 항목을 그 슬롯에 채운다. (슬롯별 setTimeout으로 관리)
   4) document.hidden이면 processFloatQueue()가 즉시 반환되어 새로 표시하지 않고
      큐에 쌓아두기만 한다. visibilitychange로 다시 보이면 이어서 처리한다.
   5) 타이머는 슬롯이 비워질 때(clearAllFloatMessages 포함) 항상 정리되어 누수가 없다.
   ================================================================= */
function initFloatSlots() {
  floatSlots = Array.from({ length: FLOAT_SLOT_COUNT }, () => ({ busy: false, timeoutId: null, el: null }));
}

function getFloatSlotPosition(slotIndex) {
  const top = FLOAT_SLOT_TOPS[slotIndex % FLOAT_SLOT_TOPS.length];
  const baseLeft = FLOAT_SLOT_LEFTS[slotIndex % FLOAT_SLOT_LEFTS.length];
  const jitter = Math.random() * 10 - 5; // -5% ~ +5%
  const left = Math.min(62, Math.max(2, baseLeft + jitter));
  return { top: `${top}%`, left: `${left}%` };
}

function showInSlot(slotIndex, item) {
  const slot = floatSlots[slotIndex];
  if (!slot || !els.floatingMsgs) return;
  slot.busy = true;

  const pos = getFloatSlotPosition(slotIndex);
  const wrap = document.createElement("div");
  wrap.className = "float-msg";
  wrap.style.top = pos.top;
  wrap.style.left = pos.left;
  wrap.style.animationDelay = `${(Math.random() * 1.4).toFixed(2)}s`;

  const inner = document.createElement("div");
  inner.className = "float-msg-inner";
  inner.appendChild(document.createTextNode("🐚 "));
  const nameEl = document.createElement("span");
  nameEl.className = "fm-name";
  nameEl.textContent = item.name || "익명"; // XSS 방지: textContent만 사용
  inner.appendChild(nameEl);
  inner.appendChild(document.createTextNode(" · " + (item.msg || "")));
  wrap.appendChild(inner);

  els.floatingMsgs.appendChild(wrap);
  slot.el = wrap;

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      inner.classList.add("visible");
    });
  });

  slot.timeoutId = setTimeout(() => {
    inner.classList.remove("visible");
    inner.classList.add("leaving");
    slot.timeoutId = setTimeout(() => {
      if (slot.el && slot.el.parentNode) slot.el.parentNode.removeChild(slot.el);
      slot.el = null;
      slot.busy = false;
      slot.timeoutId = null;
      processFloatQueue();
    }, FLOAT_EXIT_MS);
  }, FLOAT_DISPLAY_MS - FLOAT_EXIT_MS);
}

function processFloatQueue() {
  if (!guestbookOn) {
    floatQueue = [];
    return;
  }
  if (document.hidden) return; // 탭이 숨겨진 동안은 새로 표시하지 않고 큐에 유지
  if (floatQueue.length === 0) return;
  const freeIdx = floatSlots.findIndex((s) => !s.busy);
  if (freeIdx === -1) return; // 빈 슬롯이 없으면 대기
  const item = floatQueue.shift();
  showInSlot(freeIdx, item);
  if (floatQueue.length > 0) processFloatQueue(); // 남은 빈 슬롯이 더 있다면 이어서 채움
}

function enqueueFloatMessage(item) {
  if (prefersReducedMotion) return;
  if (!guestbookOn) return;
  floatQueue.push(item);
  processFloatQueue();
}

function clearAllFloatMessages() {
  floatQueue = [];
  floatSlots.forEach((slot) => {
    if (slot.timeoutId) {
      clearTimeout(slot.timeoutId);
      slot.timeoutId = null;
    }
    if (slot.el && slot.el.parentNode) slot.el.parentNode.removeChild(slot.el);
    slot.el = null;
    slot.busy = false;
  });
}

/* ================= 관리자 고정 말풍선 (상시 노출) =================
   판별: entry.admin === true 이거나 이름이 "임재영"/"재영"과 정확히 일치.
   대상 중 최신(createdAt desc) 1개를 #floating-msgs 안 상단 중앙에 상시 노출한다.
   타이머 없이 계속 표시되며, 내용이 바뀌면(add/modify/remove) 실시간으로 갱신된다.
   ================================================================= */
function isAdminEntry(entry) {
  if (!entry) return false;
  if (entry.admin === true) return true;
  const n = (entry.name || "").trim();
  return ADMIN_PINNED_NAMES.includes(n);
}

/* list는 createdAt 기준 내림차순(desc)으로 정렬되어 있다고 가정 (guestbook 쿼리와 동일) */
function findPinnedAdminEntry(list) {
  if (!Array.isArray(list)) return null;
  for (const entry of list) {
    if (isAdminEntry(entry)) return entry;
  }
  return null;
}

function removePinnedBubble() {
  if (pinnedBubbleEl && pinnedBubbleEl.parentNode) {
    pinnedBubbleEl.parentNode.removeChild(pinnedBubbleEl);
  }
  pinnedBubbleEl = null;
}

function renderPinnedBubbleContent(entry) {
  if (!pinnedBubbleEl) return;
  const inner = pinnedBubbleEl.querySelector(".float-msg-pinned-inner");
  if (!inner) return;
  inner.innerHTML = "";
  inner.appendChild(document.createTextNode("👑 "));
  const nameEl = document.createElement("span");
  nameEl.className = "fm-name";
  nameEl.textContent = entry.name || "익명"; // XSS 방지: textContent만 사용
  inner.appendChild(nameEl);
  inner.appendChild(document.createTextNode(" · " + (entry.msg || "")));
}

/* guestbookOn과 currentPinnedEntry 상태에 맞춰 고정 말풍선 DOM을 갱신한다.
   - 대상이 없거나 방명록 표시가 꺼져있으면 숨긴다.
   - 이미 떠있으면 내용만 갱신(수정 반영)하고, 새로 등장할 때만 fade-in한다. */
function updatePinnedDisplay() {
  if (!els.floatingMsgs) return;
  if (!guestbookOn || !currentPinnedEntry) {
    removePinnedBubble();
    return;
  }
  if (!pinnedBubbleEl) {
    pinnedBubbleEl = document.createElement("div");
    pinnedBubbleEl.className = "float-msg-pinned";
    pinnedBubbleEl.setAttribute("aria-hidden", "true");
    const inner = document.createElement("div");
    inner.className = "float-msg-pinned-inner";
    pinnedBubbleEl.appendChild(inner);
    els.floatingMsgs.appendChild(pinnedBubbleEl);
    renderPinnedBubbleContent(currentPinnedEntry);
    requestAnimationFrame(() => {
      requestAnimationFrame(() => inner.classList.add("visible"));
    });
  } else {
    renderPinnedBubbleContent(currentPinnedEntry);
  }
}

function startPreviewFloatCycle() {
  if (isConfigured || prefersReducedMotion) return;
  let i = 0;
  const pushPreview = () => {
    if (!guestbookOn) return;
    const sample = PREVIEW_GUESTBOOK[i % PREVIEW_GUESTBOOK.length];
    enqueueFloatMessage({ id: `preview-float-${Date.now()}-${i}`, name: sample.name, msg: sample.msg });
    i++;
  };
  pushPreview();
  floatPreviewTimer = setInterval(pushPreview, 20000);
}

/* ================= 방명록 표시 ON/OFF (관리자 설정) ================= */
function updateAdminToggleUI() {

function applyGuestbookOnState() {

    els.guestbookOffNotice.classList.remove("show");

  } else {

    els.guestbookOffNotice.classList.add("show");

  }

function subscribeSettings() {
  if (!isConfigured || !db) {
    guestbookOn = true; // 미리보기 모드는 항상 기본 ON으로 동작
    applyGuestbookOnState();
    return;
  }
  try {
    const ref = doc(db, "settings", "site");
    onSnapshot(
      ref,
      (snap) => {

        guestbookOn = data && typeof data.guestbookOn === "boolean" ? data.guestbookOn : true; // 문서 없으면 기본 ON
        applyGuestbookOnState();
      },
      (err) => {
        console.error("설정 구독 오류:", err);
        guestbookOn = true; // 에러 시에도 기본 ON으로 동작
        applyGuestbookOnState();
      }
    );
  } catch (err) {
    console.error("설정 쿼리 생성 오류:", err);
  }
}

const PREVIEW_GUESTBOOK = [
  { id: "preview-1", name: "민지", msg: "다들 이번 MT 진짜 최고였어요! 바다 보면서 먹은 삼겹살 잊지 못할 듯 😆", createdAt: new Date(Date.now() - 1000 * 60 * 42), edited: false },
  { id: "preview-2", name: "현우", msg: "필름 사진 컨셉 너무 예뻐요 다들 사진 많이 올려주세요~", createdAt: new Date(Date.now() - 1000 * 60 * 60 * 3), edited: false },
  { id: "preview-3", name: "소라", msg: "야식 라면 존맛... 다음 MT도 기대됩니다 🍜", createdAt: new Date(Date.now() - 1000 * 60 * 60 * 20), edited: true }
];

let guestbookEntries = [];
const guestbookUIState = {}; // entryId -> "confirm" | "edit" | undefined

const GUESTBOOK_MSG_MAX = 30;

function updateGuestbookCharCount() {
  const len = els.guestbookMsgInput.value.length;
  els.guestbookCharCount.textContent = `${len}/${GUESTBOOK_MSG_MAX}`;
}

function handleGuestbookMsgInput() {
  if (els.guestbookMsgInput.value.length > GUESTBOOK_MSG_MAX) {
    els.guestbookMsgInput.value = els.guestbookMsgInput.value.slice(0, GUESTBOOK_MSG_MAX);
  }
  updateGuestbookCharCount();
}

function renderGuestbook() {
  els.guestbookList.innerHTML = "";
  const list = isConfigured ? guestbookEntries : PREVIEW_GUESTBOOK;

  if (list.length === 0) {
    const empty = document.createElement("p");
    empty.className = "guestbook-empty";
    empty.textContent = "아직 방명록이 없어요. 첫 마디를 남겨보세요! 🐚";
    els.guestbookList.appendChild(empty);
    return;
  }

  list.forEach((entry, i) => {
    const uiMode = guestbookUIState[entry.id];
    const item = document.createElement("div");
    item.className = "guestbook-entry";

    const icon = document.createElement("div");
    icon.className = "guestbook-entry-icon";
    icon.textContent = GUESTBOOK_ICONS[i % GUESTBOOK_ICONS.length];
    item.appendChild(icon);

    const body = document.createElement("div");
    body.className = "guestbook-entry-body";

    const head = document.createElement("div");
    head.className = "guestbook-entry-head";
    const nameEl = document.createElement("span");
    nameEl.className = "guestbook-entry-name";
    nameEl.textContent = entry.name || "익명"; // XSS 방지: textContent만 사용
    const timeEl = document.createElement("span");
    timeEl.className = "guestbook-entry-time";
    timeEl.textContent = timeAgo(entry.createdAt);
    head.appendChild(nameEl);
    head.appendChild(timeEl);
    if (entry.edited) {
      const editedEl = document.createElement("span");
      editedEl.className = "guestbook-entry-edited";
      editedEl.textContent = "(수정됨)";
      head.appendChild(editedEl);
    }
    body.appendChild(head);

    const canManage = isAdmin && isConfigured;

    if (uiMode === "edit" && canManage) {
      const textarea = document.createElement("textarea");
      textarea.className = "guestbook-edit-textarea";
      textarea.maxLength = GUESTBOOK_MSG_MAX;
      textarea.value = entry.msg || "";
      body.appendChild(textarea);

      const actions = document.createElement("div");
      actions.className = "guestbook-entry-actions";

      const saveBtn = document.createElement("button");
      saveBtn.type = "button";
      saveBtn.textContent = "저장";
      saveBtn.addEventListener("click", async () => {
        const newMsg = textarea.value.trim();
        if (!newMsg) {
          showToast("메시지를 입력해주세요.");
          return;
        }
        if (newMsg.length > GUESTBOOK_MSG_MAX) {
          showToast(`메시지는 ${GUESTBOOK_MSG_MAX}자 이내로 남겨주세요.`);
          return;
        }
        try {
          await updateDoc(doc(db, "guestbook", entry.id), { msg: newMsg, edited: true });
          delete guestbookUIState[entry.id];
          showToast("방명록을 수정했어요 ✏️");
        } catch (err) {
          console.error("방명록 수정 실패:", err);
          showToast("수정 중 오류가 발생했어요 😢");
        }
      });

      const cancelBtn = document.createElement("button");
      cancelBtn.type = "button";
      cancelBtn.textContent = "취소";
      cancelBtn.addEventListener("click", () => {
        delete guestbookUIState[entry.id];
        renderGuestbook();
      });

      actions.appendChild(saveBtn);
      actions.appendChild(cancelBtn);
      body.appendChild(actions);
    } else {
      const msgEl = document.createElement("p");
      msgEl.className = "guestbook-entry-msg";
      msgEl.textContent = entry.msg || ""; // XSS 방지: textContent만 사용
      body.appendChild(msgEl);

      if (canManage) {
        const actions = document.createElement("div");
        actions.className = "guestbook-entry-actions";

        if (uiMode === "confirm") {
          const text = document.createElement("span");
          text.textContent = "정말 삭제할까요?";
          actions.appendChild(text);

          const delBtn = document.createElement("button");
          delBtn.type = "button";
          delBtn.className = "danger-btn";
          delBtn.textContent = "삭제";
          delBtn.addEventListener("click", async () => {
            try {
              await deleteDoc(doc(db, "guestbook", entry.id));
              delete guestbookUIState[entry.id];
              showToast("방명록을 삭제했어요 🗑️");
            } catch (err) {
              console.error("방명록 삭제 실패:", err);
              showToast("삭제 중 오류가 발생했어요 😢");
            }
          });

          const cancelBtn = document.createElement("button");
          cancelBtn.type = "button";
          cancelBtn.textContent = "취소";
          cancelBtn.addEventListener("click", () => {
            delete guestbookUIState[entry.id];
            renderGuestbook();
          });

          actions.appendChild(delBtn);
          actions.appendChild(cancelBtn);
        } else {
          const editBtn = document.createElement("button");
          editBtn.type = "button";
          editBtn.textContent = "✏️ 수정";
          editBtn.addEventListener("click", () => {
            guestbookUIState[entry.id] = "edit";
            renderGuestbook();
          });

          const delBtn = document.createElement("button");
          delBtn.type = "button";
          delBtn.className = "danger-btn";
          delBtn.textContent = "🗑️ 삭제";
          delBtn.addEventListener("click", () => {
            guestbookUIState[entry.id] = "confirm";
            renderGuestbook();
          });

          actions.appendChild(editBtn);
          actions.appendChild(delBtn);
        }

        body.appendChild(actions);
      }
    }

    item.appendChild(body);
    els.guestbookList.appendChild(item);
  });
}

async function handleGuestbookSubmit(e) {
  e.preventDefault();

  if (!guestbookOn) {
    showToast("관리자가 방명록을 잠시 꺼두었어요 🙏");
    return;
  }

  const name = els.guestbookNameInput.value.trim();
  const msg = els.guestbookMsgInput.value.trim();

  if (!name) {
    showToast("이름을 입력해주세요.");
    return;
  }
  if (!msg) {
    showToast("메시지를 입력해주세요.");
    return;
  }
  if (msg.length > GUESTBOOK_MSG_MAX) {
    showToast(`메시지는 ${GUESTBOOK_MSG_MAX}자 이내로 남겨주세요.`);
    return;
  }

  if (!isConfigured || !db) {
    showToast("⚙️ 아직 서버 연결 전이에요. 가이드를 따라 설정을 완료해주세요!");
    return;
  }

  try {
    const payload = {
      name,
      msg,
      createdAt: serverTimestamp(),
      edited: false
    };
    if (isAdmin) payload.admin = true; // 관리자 모드에서 작성한 글은 고정 노출 대상으로 표시
    await addDoc(collection(db, "guestbook"), payload);
    showToast("방명록에 남겼어요! ✍️");
    els.guestbookForm.reset();
    updateGuestbookCharCount();
  } catch (err) {
    console.error("방명록 작성 실패:", err);
    showToast("방명록 작성 중 오류가 발생했어요 😢");
  }
}

function subscribeGuestbook() {
  if (!isConfigured || !db) {
    guestbookEntries = [];
    renderGuestbook();
    return;
  }
  try {
    const q = query(collection(db, "guestbook"), orderBy("createdAt", "desc"));
    let firstSnapshot = true;
    onSnapshot(
      q,
      (snapshot) => {
        guestbookEntries = snapshot.docs.map((d) => ({ id: d.id, ...d.data() }));
        renderGuestbook();

        /* 관리자 고정 말풍선: add/modify/remove 모두 매 스냅샷마다 전체 목록에서
           최신 관리자 글을 다시 찾아 반영한다 (수정 시 내용 교체, 삭제 시 다음 글로 교체). */
        currentPinnedEntry = findPinnedAdminEntry(guestbookEntries);
        updatePinnedDisplay();
        const pinnedId = currentPinnedEntry ? currentPinnedEntry.id : null;

        if (firstSnapshot) {
          firstSnapshot = false;
          /* 최초 스냅샷: 최신 3개만 큐에 넣어 분위기 연출 (오래된 순으로 자연스럽게).
             단, 고정 노출 중인 관리자 글은 중복 노출을 막기 위해 큐에서 제외한다. */
          guestbookEntries.slice(0, 3).slice().reverse().forEach((entry) => {
            if (entry.id === pinnedId) return;
            if (!floatShownIds.has(entry.id)) {
              floatShownIds.add(entry.id);
              enqueueFloatMessage({ id: entry.id, name: entry.name, msg: entry.msg });
            }
          });
        } else {
          /* 이후: 실시간으로 새로 추가된(added) 글만 큐에 push, 중복 방지.
             고정 노출 중인 관리자 글은 순환 큐에서 제외한다. */
          snapshot.docChanges().forEach((change) => {
            if (change.type === "added") {
              const entry = { id: change.doc.id, ...change.doc.data() };
              if (entry.id === pinnedId) return;
              if (!floatShownIds.has(entry.id)) {
                floatShownIds.add(entry.id);
                enqueueFloatMessage({ id: entry.id, name: entry.name, msg: entry.msg });
              }
            }
          });
        }
      },
      (err) => {
        console.error("방명록 구독 오류:", err);
        showToast("방명록을 불러오지 못했어요 😢");
      }
    );
  } catch (err) {
    console.error("방명록 쿼리 생성 오류:", err);
    showToast("방명록을 불러오는 중 오류가 발생했어요 😢");
  }
}

  els.adminModalOverlay.addEventListener("click", (e) => {
    if (e.target === els.adminModalOverlay) closeAdminModal();
  });
  els.adminPasswordInput.addEventListener("keydown", (e) => {

      else if (e.key === "ArrowRight") nextPhoto();
      else if (e.key === "ArrowLeft") prevPhoto();
      return;
    }
    if (els.adminModalOverlay.classList.contains("open") && e.key === "Escape") {
      closeAdminModal();
    }
  });

  els.lightbox.addEventListener("touchstart", (e) => {
    touchStartX = e.changedTouches[0].clientX;
  }, { passive: true });

  els.lightbox.addEventListener("touchend", (e) => {
    if (touchStartX === null) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 50) {
      if (dx < 0) nextPhoto();
      else prevPhoto();
    }
    touchStartX = null;
  }, { passive: true });

  /* 탭이 다시 보일 때 대기 중인 떠다니는 방명록 큐를 이어서 처리 (숨김 중엔 큐 폭주 방지) */
  document.addEventListener("visibilitychange", () => {
    if (!document.hidden) processFloatQueue();
  });
}

/* ================= Firestore 연동 ================= */
function subscribePhotos() {
  if (!isConfigured || !db) {
    photos = [];
    renderAll();
    return;
  }
  try {
    const q = query(collection(db, "photos"), orderBy("createdAt", "desc"));
    onSnapshot(
      q,
      (snapshot) => {
        photos = snapshot.docs.map((d) => ({ id: d.id, ...d.data() }));
        renderAll();
      },
      (err) => {
        console.error("Firestore 구독 오류:", err);
        showToast("사진을 불러오지 못했어요 😢");
      }
    );
  } catch (err) {
    console.error("Firestore 쿼리 생성 오류:", err);
    showToast("사진 목록을 불러오는 중 오류가 발생했어요 😢");
  }
}

/* ================= 초기화 ================= */
function init() {
  initDom();
  if (!isConfigured) {
    els.banner.style.display = "block";
  }
  renderFloaties();
  initFloatSlots();
  bindEvents();
  renderAll();
  subscribePhotos();
  updateGuestbookCharCount();
  renderGuestbook();
  if (!isConfigured) {
    /* 미리보기 모드: 샘플 고정 말풍선 표시 (subscribeSettings가 guestbookOn을
       확정하면서 updatePinnedDisplay()를 호출하므로 그 전에 대상만 세팅해둔다) */
    currentPinnedEntry = SAMPLE_PINNED_ENTRY;
  }
  subscribeGuestbook();
  subscribeSettings();
  if (!isConfigured) {
    startPreviewFloatCycle();
  }
}

if (document.readyState === "loading") {
  document.addEventListener("DOMContentLoaded", init);
} else {
  init();
}
</script>
</body>
</html>
